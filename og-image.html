<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>cut club GOAT — OGP banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Outfit:wght@600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --brand:#c99a4c; --ink:#f3efe7; --text:#cfcabf; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: "Oswald","Noto Sans JP",sans-serif; color: var(--text);
    background:
      radial-gradient(58% 80% at 88% 6%, rgba(201,154,76,.22) 0%, transparent 56%),
      radial-gradient(54% 66% at 4% 100%, rgba(201,154,76,.1) 0%, transparent 52%),
      linear-gradient(160deg, #0c0b0f 0%, #17141a 100%);
    display: flex; align-items: center; position: relative; overflow: hidden;
  }
  .frame { position: absolute; inset: 30px; border: 2px solid rgba(201,154,76,.35); border-radius: 12px; }
  .inner { position: relative; padding: 0 84px; max-width: 780px; }
  .en { font-family:"Outfit",sans-serif; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--brand); font-size:27px; margin-bottom:14px; }
  h1 { font-family:"Oswald",sans-serif; font-weight:700; color:var(--ink); font-size:78px; letter-spacing:.03em; line-height:1.22; margin-bottom:22px; }
  h1 b { color: var(--brand); }
  .rule { width: 100px; height: 5px; border-radius: 6px; background: linear-gradient(90deg, var(--brand), #e0b566); margin-bottom: 22px; }
  .tag { font-size: 28px; color: #c3bdb2; font-weight: 500; margin-bottom: 12px; font-family:"Noto Sans JP",sans-serif; }
  .area { font-size: 24px; color: var(--brand); letter-spacing: .04em; font-weight: 700; font-family:"Noto Sans JP",sans-serif; }
  .orb {
    position: absolute; right: 108px; top: 50%; transform: translateY(-50%);
    width: 288px; height: 288px; border-radius: 50%;
    background:
      radial-gradient(circle at 36% 28%, #efdcb0 0 16%, transparent 17%),
      radial-gradient(circle at 62% 70%, #7a5c26 0 42%, transparent 43%),
      conic-gradient(from 210deg, #c99a4c, #e6c078, #9a7532, #7c5d28, #c99a4c);
    box-shadow: inset 0 -10px 24px rgba(0,0,0,.55), inset 0 12px 22px rgba(239,220,176,.55), 0 16px 40px rgba(0,0,0,.5);
  }
  .orb::after { content:""; position:absolute; left:24%; top:16%; width:34%; height:48%; border-radius:50%; background: linear-gradient(150deg, rgba(255,255,255,.7), rgba(255,255,255,0)); filter: blur(2px); }
  .badge { position: absolute; right: 54px; bottom: 50px; background: var(--brand); color: #14110a; font-size: 19px; letter-spacing: .08em; font-weight: 600; padding: 9px 20px; border-radius: 999px; font-family:"Noto Sans JP",sans-serif; }
</style>
</head>
<body>
  <div class="frame"></div>
  <div class="inner">
    <div class="en">Barber — Ageo</div>
    <h1>いつもの自分を、<br><b>格上げする</b>。</h1>
    <div class="rule"></div>
    <div class="tag">メンズ専門バーバー × 完全個室</div>
    <div class="area">上尾・向山／cut club GOAT</div>
  </div>
  <div class="orb" aria-hidden="true"></div>
  <div class="badge">ホームページ提案サンプル</div>
</body>
</html>
